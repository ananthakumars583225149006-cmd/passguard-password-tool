<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Strength Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0a0e17, #141c2b);
            padding: 20px;
        }
        .container {
            background: #1a2332;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            max-width: 550px;
            width: 100%;
            border: 1px solid #2a3a50;
        }
        h1 {
            text-align: center;
            color: #e8edf5;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 28px;
        }
        h1 .highlight {
            color: #6c8cff;
        }
        .subtitle {
            text-align: center;
            color: #8794b0;
            font-size: 13px;
            margin-bottom: 20px;
            border-bottom: 1px dashed #2a3a50;
            padding-bottom: 12px;
        }
        label {
            color: #bcc9e3;
            font-weight: 500;
            font-size: 13px;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #2a3a50;
            background: #0f1724;
            color: #eef3fc;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        input:focus {
            border-color: #6c8cff;
            box-shadow: 0 0 0 3px rgba(108, 140, 255, 0.2);
        }
        .password-container {
            position: relative;
        }
        .toggle-visibility {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8794b0;
            font-size: 20px;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 20px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.25s;
            flex: 1;
            min-width: 80px;
        }
        .btn-primary {
            background: #2a6df4;
            color: white;
        }
        .btn-primary:hover {
            background: #1e5ad6;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #9b6bff;
            color: white;
        }
        .btn-secondary:hover {
            background: #835be6;
            transform: scale(1.02);
        }
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        .btn-success:hover {
            background: #27ae60;
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            color: #bcc9e3;
            border: 2px solid #2a3a50;
        }
        .btn-outline:hover {
            background: #2a3a50;
            color: white;
        }
        .btn-copy {
            background: #2f3a52;
            color: #bcc9e3;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-copy:hover {
            background: #3c4a66;
            color: white;
        }
        .btn-copy.copied {
            background: #2a6df4;
            color: white;
        }
        .strength-meter {
            margin-top: 20px;
            background: #0f1724;
            border-radius: 14px;
            padding: 20px;
        }
        .strength-bar {
            height: 8px;
            background: #2a3a50;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: 0.5s ease;
        }
        .strength-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #strengthText {
            font-weight: 600;
            font-size: 16px;
        }
        .criteria {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        .criterion {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8794b0;
            font-size: 13px;
            padding: 6px 10px;
            background: #0f1724;
            border-radius: 8px;
        }
        .criterion.valid {
            color: #4cdf8b;
        }
        .criterion .icon {
            font-size: 16px;
        }
        .footer-note {
            margin-top: 15px;
            color: #4b5670;
            font-size: 11px;
            text-align: center;
        }
        @media (max-width: 500px) {
            .container {
                padding: 20px 15px;
            }
            .criteria {
                grid-template-columns: 1fr;
            }
            button {
                font-size: 12px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 <span class="highlight">Pass</span>Guard</h1>
        <div class="subtitle">Check password strength · Generate secure passwords</div>

        <label for="password">Enter Password</label>
        <div class="password-container">
            <input type="password" id="password" placeholder="Type your password..." oninput="checkStrength()" />
            <button class="toggle-visibility" onclick="toggleVisibility()">👁️</button>
        </div>

        <div class="btn-group">
            <button class="btn-secondary" onclick="generatePassword()">🎲 Generate Strong Password</button>
            <button class="btn-outline" onclick="clearAll()">🗑️ Clear</button>
        </div>

        <div class="strength-meter">
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-label">
                <span id="strengthText">Enter a password</span>
                <span id="strengthScore">0%</span>
            </div>
            <div class="criteria">
                <div class="criterion" id="c1"><span class="icon">⬜</span> 8+ characters</div>
                <div class="criterion" id="c2"><span class="icon">⬜</span> Uppercase & Lowercase</div>
                <div class="criterion" id="c3"><span class="icon">⬜</span> Contains numbers</div>
                <div class="criterion" id="c4"><span class="icon">⬜</span> Special characters</div>
            </div>
        </div>

        <div style="margin-top:10px;">
            <button class="btn-copy" onclick="copyPassword()" style="width:100%;">📋 Copy Password</button>
        </div>

        <div class="footer-note">⚡ Password never stored · 100% client-side</div>
    </div>

    <script>
        function toggleVisibility() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.toggle-visibility');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        function checkStrength() {
            const password = document.getElementById('password').value;
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            const score = document.getElementById('strengthScore');

            const hasLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password) && /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            updateCriterion('c1', hasLength);
            updateCriterion('c2', hasUpper);
            updateCriterion('c3', hasNumber);
            updateCriterion('c4', hasSpecial);

            let strength = 0;
            const checks = [hasLength, hasUpper, hasNumber, hasSpecial];
            const passed = checks.filter(Boolean).length;
            strength = (passed / 4) * 100;

            if (password.length >= 12) strength = Math.min(100, strength + 10);
            if (password.length >= 16) strength = Math.min(100, strength + 10);

            fill.style.width = strength + '%';
            score.textContent = Math.round(strength) + '%';

            let color, label;
            if (strength === 0) { color = '#2a3a50';
                label = 'Enter a password'; } else if (strength < 25) { color = '#e74c3c';
                label = 'Weak'; } else if (strength < 50) { color = '#f39c12';
                label = 'Fair'; } else if (strength < 75) { color = '#f1c40f';
                label = 'Good'; } else { color = '#2ecc71';
                label = 'Strong'; }

            fill.style.background = color;
            text.textContent = label;
            text.style.color = color;
        }

        function updateCriterion(id, valid) {
            const el = document.getElementById(id);
            if (valid) {
                el.classList.add('valid');
                el.querySelector('.icon').textContent = '✅';
            } else {
                el.classList.remove('valid');
                el.querySelector('.icon').textContent = '⬜';
            }
        }

        function generatePassword() {
            const length = 16;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';
            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').value = password;
            checkStrength();
            const copyBtn = document.querySelector('.btn-copy');
            copyBtn.textContent = '📋 Copy Password';
            copyBtn.classList.remove('copied');
        }

        function copyPassword() {
            const password = document.getElementById('password').value;
            const copyBtn = document.querySelector('.btn-copy');
            if (!password) { alert('No password to copy!'); return; }
            navigator.clipboard.writeText(password).then(() => {
                copyBtn.textContent = '✅ Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy Password';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                alert('Copy: ' + password);
            });
        }

        function clearAll() {
            document.getElementById('password').value = '';
            checkStrength();
            const copyBtn = document.querySelector('.btn-copy');
            copyBtn.textContent = '📋 Copy Password';
            copyBtn.classList.remove('copied');
        }
    </script>
</body>
</html>
